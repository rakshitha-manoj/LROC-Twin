run_name: lroc-twin-r32
base_model: Qwen/Qwen2-VL-2B-Instruct

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: float16
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: nf4

training:
  output_dir: outputs/lroc-twin-r32
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: true
  bf16: false
  gradient_checkpointing: true
  dataloader_num_workers: 0
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  evaluation_strategy: steps
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  report_to: wandb

data:
  train_split: data/processed/lucid_train.jsonl
  val_split: data/processed/lucid_val.jsonl
  max_seq_length: 1024
  image_max_pixels: 200704
